name: Build and Deploy RRG Dashboard

on:
  schedule:
    - cron: '0 0 * * *'  # 5:30 AM IST, daily
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install bse pandas numpy pyarrow

      - name: Run RRG script
        run: python bse_rrg.py
        env:
          CI: true

      - name: Commit cache
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add bse_cache/
          git diff --staged --quiet || git commit -m "Update cache $(date +'%Y-%m-%d')"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./rrg_output
          publish_branch: gh-pages
